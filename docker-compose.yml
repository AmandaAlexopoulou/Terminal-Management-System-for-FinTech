# ============================================================================
# docker-compose.yml — Terminal Management System (TMS)
# ============================================================================
# Σηκώνει ολόκληρο το σύστημα με ένα μόνο: `docker compose up`
#
# 4 services (3 απαιτούμενα + 1 bonus):
#   1) mysql    -> η κύρια βάση δεδομένων (terminals, merchants, templates)
#   2) redis    -> caching layer (Feature C)
#   3) tms-api  -> το Flask REST API μας
#   4) tms-cron -> [BONUS] nightly cleanup του decommission_queue
#
# Σημείωση: δεν βάζουμε πεδίο "version:" στην κορυφή, γιατί είναι πλέον
# deprecated στο σύγχρονο Docker Compose (V2 plugin) — απλά αγνοείται και
# βγάζει ένα άχρηστο warning.
# ============================================================================

services:

  # --------------------------------------------------------------------
  # MySQL — η κύρια βάση δεδομένων
  # --------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: tms-mysql
    restart: unless-stopped
    environment:
      # Όλα τα credentials έρχονται από το .env — ΠΟΤΕ hardcoded εδώ μέσα.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      # Εκτίθεται στον host ΜΟΝΟ για βολικό debugging (π.χ. σύνδεση με
      # MySQL Workbench / DBeaver). Το tms-api συνδέεται εσωτερικά μέσω
      # του docker network (service name "mysql"), όχι μέσω αυτού του port.
      - "3306:3306"
    volumes:
      # Named volume ώστε τα δεδομένα να ΕΠΙΒΙΩΝΟΥΝ σε restart/recreate
      # του container (χωρίς αυτό, κάθε "docker compose down" θα τα έσβηνε).
      - mysql_data:/var/lib/mysql
      # Mount των .sql αρχείων μέσα στο ειδικό directory που «βλέπει»
      # αυτόματα το επίσημο MySQL image: ό,τι .sql/.sh βρεθεί εδώ τρέχει
      # ΜΙΑ ΦΟΡΑ, μόνο όταν το data directory είναι εντελώς άδειο (δηλαδή
      # στο ΠΡΩΤΟ boot). Σε επόμενα boots αγνοείται εντελώς.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # mysqladmin ping ελέγχει αν ο MySQL server απαντάει σε connections.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s   # δίνουμε χρόνο στο πρώτο init (τρέξιμο των .sql seed αρχείων)

  # --------------------------------------------------------------------
  # Redis — caching layer (Feature C)
  # --------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------
  # tms-api — το Flask REST API
  # --------------------------------------------------------------------
  tms-api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: tms-api
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      FLASK_ENV: ${FLASK_ENV}
      APP_PORT: ${APP_PORT}
    ports:
      - "${APP_PORT:-5000}:5000"
    depends_on:
      # ΔΕΝ αρκεί το απλό "depends_on: [mysql, redis]" (αυτό περιμένει
      # μόνο να ΞΕΚΙΝΗΣΕΙ το container, όχι να είναι έτοιμο). Θέλουμε να
      # περιμένουμε να είναι πραγματικά healthy, αλλιώς το Flask app θα
      # σκάει σε race condition στο πρώτο connection attempt.
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --------------------------------------------------------------------
  # tms-cron — [BONUS] nightly cleanup του decommission_queue
  # --------------------------------------------------------------------
  tms-cron:
    build:
      context: ./cron
      dockerfile: Dockerfile
    container_name: tms-cron
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # Ώρα (UTC) του nightly cleanup — default 02:00.
      CRON_HOUR: ${CRON_HOUR:-2}
      CRON_MINUTE: ${CRON_MINUTE:-0}
      # true -> τρέχει ΚΑΙ ένα άμεσο cleanup στο startup, βολικό για
      # demo/testing ώστε να μη χρειάζεται να περιμένετε 24ωρο.
      CLEANUP_RUN_ON_STARTUP: ${CLEANUP_RUN_ON_STARTUP:-false}
    depends_on:
      # Το tms-cron ΔΕΝ χρειάζεται το redis (δεν αγγίζει cache), μόνο mysql.
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
